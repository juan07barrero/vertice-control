<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${gasto.id == null ? 'Nuevo gasto' : 'Editar gasto'}"></title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        :root {
            --negro: #0d0e12;
            --negro-card: #14161d;
            --azul: #243c96;
            --azul-2: #1b2f78;
            --naranja: #d98a1e;
            --texto: #f4efe8;
            --texto-suave: #b9c2d6;
            --borde: rgba(255,255,255,0.08);
            --sombra: 0 14px 30px rgba(0,0,0,0.35);
            --error: #ff8f8f;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: "Segoe UI", Arial, sans-serif;
            background:
                radial-gradient(circle at top right, rgba(36,60,150,0.18), transparent 28%),
                linear-gradient(180deg, #101116 0%, #0b0c10 100%);
            color: var(--texto);
        }

        .container {
            max-width: 720px;
            margin: 0 auto;
            padding: 24px 18px 100px;
        }

        .header-card,
        .form-card {
            background: linear-gradient(180deg, #151822 0%, #101116 100%);
            border: 1px solid rgba(36,60,150,0.35);
            border-radius: 26px;
            padding: 22px;
            box-shadow: var(--sombra);
        }

        .header-card {
            margin-bottom: 20px;
        }

        .header-card h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        .header-card p {
            margin: 0;
            color: var(--texto-suave);
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 700;
            color: var(--texto);
        }

        input,
        select {
            width: 100%;
            padding: 13px 14px;
            border-radius: 14px;
            border: 1px solid var(--borde);
            background: #0f1117;
            color: var(--texto);
            font-size: 0.96rem;
            outline: none;
        }

        input:focus,
        select:focus {
            border-color: rgba(217,138,30,0.7);
            box-shadow: 0 0 0 3px rgba(217,138,30,0.12);
        }

        .error {
            margin-top: 6px;
            color: var(--error);
            font-size: 0.88rem;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 22px;
        }

        .btn {
            display: inline-block;
            text-decoration: none;
            padding: 12px 18px;
            border-radius: 14px;
            font-weight: 700;
            border: 1px solid rgba(36,60,150,0.35);
            box-shadow: var(--sombra);
            cursor: pointer;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--azul), var(--azul-2));
            color: white;
        }

        .btn-secondary {
            background: #171922;
            color: var(--texto);
        }
    </style>
</head>
<body>
<div class="container">

    <div class="header-card">
        <h1 th:text="${gasto.id == null ? 'Nuevo gasto' : 'Editar gasto'}"></h1>
        <p>Registra materias primas, empaques, transporte u otros costos del negocio.</p>
    </div>

    <div class="form-card">
        <form th:action="@{/gastos/guardar}" th:object="${gasto}" method="post">
            <input type="hidden" th:field="*{id}">

            <div class="form-group">
                <label for="fecha">Fecha</label>
                <input id="fecha" type="date" th:field="*{fecha}">
                <div class="error" th:if="${#fields.hasErrors('fecha')}" th:errors="*{fecha}"></div>
            </div>

            <div class="form-group">
                <label for="categoria">Categoría</label>
                <select id="categoria" th:field="*{categoria}">
                    <option value="">Seleccione una categoría</option>
                    <option value="Café verde">Café verde</option>
                    <option value="Tostión">Tostión</option>
                    <option value="Bolsas / empaques">Bolsas / empaques</option>
                    <option value="Stickers / etiquetas">Stickers / etiquetas</option>
                    <option value="Transporte">Transporte</option>
                    <option value="Insumos varios">Insumos varios</option>
                </select>
                <div class="error" th:if="${#fields.hasErrors('categoria')}" th:errors="*{categoria}"></div>
            </div>

            <div class="form-group">
                <label for="descripcion">Descripción</label>
                <input id="descripcion" type="text" th:field="*{descripcion}">
                <div class="error" th:if="${#fields.hasErrors('descripcion')}" th:errors="*{descripcion}"></div>
            </div>

            <div class="form-group">
                <label for="monto">Monto</label>
                <input id="monto" type="number" step="0.01" th:field="*{monto}">
                <div class="error" th:if="${#fields.hasErrors('monto')}" th:errors="*{monto}"></div>
            </div>

            <div class="form-group">
                <label for="proveedor">Proveedor</label>
                <input id="proveedor" type="text" th:field="*{proveedor}">
            </div>

            <div class="actions">
                <button class="btn btn-primary" type="submit">Guardar gasto</button>
                <a class="btn btn-secondary" th:href="@{/gastos}">← Volver al listado</a>
            </div>
        </form>
    </div>

</div>
</body>
</html>
